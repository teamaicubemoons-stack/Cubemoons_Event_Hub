<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lead Database | LeadScan Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            overflow-x: hidden !important;
            width: 100% !important;
            position: relative;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }
        /* Table enhancements from style.css are already applied, adding specific overrides if needed */
        .leads-table th {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            background: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            z-index: 40;
            white-space: nowrap;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .leads-table td {
            font-size: 11px;
            border-bottom: 1px solid #f1f5f9;
            white-space: nowrap;
            padding: 8px 12px;
        }

        @media (max-width: 640px) {
            .leads-table th, .leads-table td {
                padding: 6px 8px !important;
                font-size: 10px !important;
            }
            .main-container {
                padding: 8px 10px 40px 10px !important;
            }
        }
        .photo-thumb {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
            cursor: zoom-in;
        }
        .photo-thumb:hover {
            transform: scale(1.5);
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .long-text-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .long-text-cell:hover {
            white-space: normal;
            word-wrap: break-word;
            position: relative;
            background: #fff;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        /* Sticky first column removed per user request */
        /* .leads-table th:first-child,
        .leads-table td:first-child {
            position: sticky;
            left: 0;
            background: inherit;
            z-index: 20;
            border-right: 1px solid #e2e8f0;
        } */
        /* .leads-table th:first-child {
            z-index: 30;
        } */
        /* Row hover effect */
        .leads-table tbody tr:hover td {
            background-color: #f8fafc;
        }

        /* Skeleton Animation */
        @keyframes skeleton-loading {
            0% { background-color: #f3f4f6; }
            50% { background-color: #e5e7eb; }
            100% { background-color: #f3f4f6; }
        }
        .skeleton {
            animation: skeleton-loading 1.5s infinite ease-in-out;
            height: 12px;
            width: 80%;
            border-radius: 6px;
            margin: 4px auto;
        }
        /* Custom Dropdown Styling */
        .dropdown-menu {
            transform-origin: top;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(-8px) scale(0.95);
            pointer-events: none;
            visibility: hidden;
            z-index: 9999 !important;
        }
        .dropdown-menu.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            visibility: visible;
        }
        .dropdown-item {
            padding: 10px 14px;
            font-size: 0.875rem;
            color: #4b5563;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .dropdown-item:hover {
            background-color: #eff6ff;
            color: #2563eb;
        }
        .dropdown-item.selected {
            background-color: #eff6ff;
            color: #2563eb;
            font-weight: 700;
        }
        .dropdown-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #f9fafb;
            border-color: #f1f5f9;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="main-container w-full max-w-full overflow-x-hidden mx-auto p-3 sm:p-5 lg:p-7">
        
        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-4">

                    <svg class="w-4 h-4 sm:w-5 sm:h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                <div class="flex items-center gap-3 min-w-0">

                    <div>

            </div>
            
            <div class="flex w-full lg:w-auto min-w-[300px] lg:min-w-[400px] bg-gray-100/50 backdrop-blur-md border border-gray-200 p-1 rounded-2xl shadow-inner overflow-hidden">
                <button onclick="switchTab('leads')" id="tabLeads" class="flex-1 flex items-center justify-center gap-2 px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all duration-300 bg-blue-600 text-white shadow-xl">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Scanned Cards
                </button>
                <button onclick="switchTab('events')" id="tabEvents" class="flex-1 flex items-center justify-center gap-2 px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all duration-300 text-gray-500 hover:text-gray-700">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    QR Visitor
                </button>
            </div>
        </div>

        <!-- Filters Bar -->
        <div class="grid grid-cols-2 lg:grid-cols-12 gap-3 mb-4 p-3 bg-white/50 backdrop-blur-sm rounded-2xl border border-gray-200 shadow-sm relative z-50">
            <div class="col-span-2 lg:col-span-6">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Universal Search</label>
                <div class="relative group">
                    <input type="text" id="searchInput" oninput="applyFilters()" placeholder="Search..." class="w-full pl-9 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none group-hover:border-gray-300">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            <div class="col-span-1 lg:col-span-3">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Filter ID</label>
                <div class="relative group" id="eventIdDropdown">
                    <input type="hidden" id="eventIdFilter" value="" onchange="applyFilters()">
                    <button id="eventIdBtn" type="button" onclick="toggleDropdown('eventId')" class="dropdown-btn w-full pl-9 pr-8 py-2 bg-white border border-gray-200 rounded-lg text-xs focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none cursor-pointer text-left truncate transition-all group-hover:border-gray-300">

                    </button>
                    <!-- Custom Menu -->
                    <div id="eventIdMenu" class="dropdown-menu absolute top-full left-0 w-[180px] mt-1 bg-white border border-gray-200 rounded-lg shadow-xl z-[100] max-h-[200px] overflow-y-auto p-1.5 space-y-0.5">
                        <!-- Populated by JS -->
                    </div>
                    <svg class="w-3.5 h-3.5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 group-focus-within:text-blue-500 transition-colors pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                    <svg class="w-3.5 h-3.5 text-gray-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none group-focus-within:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            <div class="col-span-1 lg:col-span-3">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 ml-1">Event Name</label>
                <div class="relative group" id="eventNameDropdown">
                    <input type="hidden" id="eventNameFilter" value="" onchange="applyFilters()">
                    <button id="eventNameBtn" type="button" onclick="toggleDropdown('eventName')" class="dropdown-btn w-full pl-9 pr-8 py-2 bg-white border border-gray-200 rounded-lg text-xs focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none cursor-pointer text-left truncate transition-all group-hover:border-gray-300">
                        <span id="eventNameLabel" class="text-gray-700">All Events</span>
                    </button>
                    <!-- Custom Menu -->
                    <div id="eventNameMenu" class="dropdown-menu absolute top-full right-0 w-[180px] mt-1 bg-white border border-gray-200 rounded-lg shadow-xl z-[100] max-h-[200px] overflow-y-auto p-1.5 space-y-0.5">
                        <!-- Populated by JS -->
                    </div>
                    <svg class="w-3.5 h-3.5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 group-focus-within:text-blue-500 transition-colors pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <svg class="w-3.5 h-3.5 text-gray-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none group-focus-within:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <!-- content -->
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col h-[65vh] sm:h-[80vh]">
            <!-- Responsive Table Hint -->
            <div class="lg:hidden px-3 py-1.5 bg-blue-50/50 border-b border-gray-100 flex items-center justify-center gap-2">
                <svg class="w-3 h-3 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"></path></svg>
                <span class="text-[9px] font-bold text-blue-600 uppercase tracking-tighter">Swipe horizontally for more details</span>
                <svg class="w-3 h-3 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </div>
            
            <div class="leads-table-container flex-1 overflow-auto scrollbar-thin hover:scrollbar-thumb-gray-300">
                <div class="block w-full align-middle">
                    <table class="leads-table w-full border-separate border-spacing-0">

                        <tr><td colspan="22" class="p-4"><div class="skeleton"></div></td></tr>

    <!-- Global Hover Preview (Fixed to avoid table overflow clipping) -->

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-8 transform transition-all border border-white/20">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h2M4 8h16"></path></svg>
                </div>
                <h3 class="text-2xl font-black text-slate-800 tracking-tight" id="qrModalTitle">Event QR Code</h3>
                <p id="qrModalEventId" class="text-blue-600 font-bold uppercase tracking-widest text-[10px] bg-blue-50 px-3 py-1 rounded-full inline-block mt-2">ID: EVT-001</p>
                <p class="text-slate-500 text-sm font-medium mt-3">Scan this to view profile and save contact</p>
            </div>
            
            <div id="qrcodeContainer" class="flex justify-center p-6 bg-slate-50 rounded-3xl border border-slate-100 shadow-inner mb-6">
                <!-- QR Code will be injected here -->
            </div>

            <div class="space-y-3">
                <button onclick="downloadQR()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    DOWNLOAD QR
                </button>
                <button onclick="hideQRModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all">
                    CLOSE
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let APPS_SCRIPT_URL = '';
        let qrInstance = null;
        let currentEventId = '';
        
        // --- Hover Logic ---
        const previewEl = document.getElementById('globalHoverPreview');
        const previewImg = document.getElementById('globalPreviewImg');
        const previewLoad = document.getElementById('globalPreviewLoading');

        function showPreview(e, highResUrl) {
            previewImg.onload = () => { previewLoad.classList.add('hidden'); };
            previewImg.src = highResUrl;
            previewLoad.classList.remove('hidden');
            
            previewEl.classList.remove('hidden');
            // Small delay to allow fade in
            requestAnimationFrame(() => previewEl.classList.remove('opacity-0'));
            
            movePreview(e);
        }

        function movePreview(e) {
            // Position to the right of the cursor mostly, but flip if too close to edge
            const xOffset = 20;
            const yOffset = 20;
            
            let left = e.clientX + xOffset;
            let top = e.clientY + yOffset;

            // Flip horizontally if overflow right
            if (left + 300 > window.innerWidth) {
                left = e.clientX - 300;
            }
            // Flip vertically if overflow bottom
            if (top + 200 > window.innerHeight) {
                top = e.clientY - 200;
            }

            previewEl.style.left = `${left}px`;
            previewEl.style.top = `${top}px`;
        }

        function hidePreview() {
            previewEl.classList.add('opacity-0');
            setTimeout(() => {
                if (previewEl.classList.contains('opacity-0')) {
                    previewEl.classList.add('hidden');
                    previewImg.src = ''; 
                }
            }, 200);
        }
        // -------------------

        const LEADS_COL_KEYS = [
            ['S No.'], ['Event ID'], ['Event Name'], ['Event Start Date'], ['Event End Date'],
            ['Card Photo 1'], ['Card Photo 2'], ['Company Name'], ['Industry'], 
            ['Person Name'], ['Designation'], ['Phone'], ['Email'], ['Website'], 
            ['Social Media'], ['Address'], ['Services'], ['Company Size'], ['Founded Year'], 
            ['Registration Status'], ['Trust Score'], ['Key People (Founder/CEO)'], ['Is Validated'], 
            ['Source Link'], ['About Company'], ['Location']
        ];

        const EVENTS_COL_KEYS = [
            ['S No.'], ['Event ID'], ['Event Name'], ['Visitor Name'], ['Visitor Email'], 
            ['Visitor Mobile'], ['Visitor Organization'], ['Visitor Designation'], ['Message']
        ];

        let currentTab = 'leads'; // or 'events'
        let originalData = []; // Store full data for filtering

        function switchTab(tab) {
            currentTab = tab;
            const tabLeads = document.getElementById('tabLeads');
            const tabEvents = document.getElementById('tabEvents');
            
            // Reset filters on tab switch
            document.getElementById('searchInput').value = '';
            
            // Native selects
            const idFilter = document.getElementById('eventIdFilter');
            const nameFilter = document.getElementById('eventNameFilter');
            if (idFilter) idFilter.value = '';
            if (nameFilter) nameFilter.value = '';

            // Custom Labels
            const idLabel = document.getElementById('eventIdLabel');
            const nameLabel = document.getElementById('eventNameLabel');
            if (idLabel) idLabel.innerText = 'All IDs';
            if (nameLabel) nameLabel.innerText = 'All Events';
            
            if (tab === 'leads') {
                tabLeads.className = "flex-1 flex items-center justify-center gap-2 px-6 py-3 text-[11px] font-black uppercase tracking-widest rounded-xl transition-all duration-300 bg-blue-600 text-white shadow-xl";
                tabEvents.className = "flex-1 flex items-center justify-center gap-2 px-6 py-3 text-[11px] font-black uppercase tracking-widest rounded-xl transition-all duration-300 text-gray-500 hover:text-gray-700";
            } else {
                tabEvents.className = "flex-1 flex items-center justify-center gap-2 px-6 py-3 text-[11px] font-black uppercase tracking-widest rounded-xl transition-all duration-300 bg-blue-600 text-white shadow-xl";
                tabLeads.className = "flex-1 flex items-center justify-center gap-2 px-6 py-3 text-[11px] font-black uppercase tracking-widest rounded-xl transition-all duration-300 text-gray-500 hover:text-gray-700";
            }
            
            loadData();
        }

        function toggleDropdown(type) {
            const menuId = type === 'eventId' ? 'eventIdMenu' : 'eventNameMenu';
            const menu = document.getElementById(menuId);
            const otherMenuId = type === 'eventId' ? 'eventNameMenu' : 'eventIdMenu';
            const otherMenu = document.getElementById(otherMenuId);
            
            // Close other
            if (otherMenu) otherMenu.classList.remove('active');
            
            // Toggle current
            if (menu) menu.classList.toggle('active');
        }

        // Close on click outside
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#eventIdDropdown')) document.getElementById('eventIdMenu')?.classList.remove('active');
            if (!e.target.closest('#eventNameDropdown')) document.getElementById('eventNameMenu')?.classList.remove('active');
        });

        function selectOption(type, value, label) {
            const filterInput = document.getElementById(type + 'Filter');
            const labelEl = document.getElementById(type + 'Label');
            const menu = document.getElementById(type + 'Menu');
            
            filterInput.value = value;
            labelEl.innerText = label;
            menu.classList.remove('active');
            
            // Mutually exclusive: Disable other filter if a value is selected
            const otherType = type === 'eventId' ? 'eventName' : 'eventId';
            const otherBtn = document.getElementById(otherType + 'Btn');
            
            if (value && value !== '') {
                otherBtn.disabled = true;
            } else {
                otherBtn.disabled = false;
            }
            
            applyFilters();
        }

        function populateFilterDropdowns(data) {
            const idSet = new Set();
            const nameSet = new Set();
            
            data.forEach(row => {
                const id = getValue(row, ['Event ID']);
                const name = getValue(row, ['Event Name']);
                if (id && id !== '-') idSet.add(id);
                if (name && name !== '-') nameSet.add(name);
            });
            
            const idMenu = document.getElementById('eventIdMenu');
            const nameMenu = document.getElementById('eventNameMenu');
            
            const currentId = document.getElementById('eventIdFilter').value;
            const currentName = document.getElementById('eventNameFilter').value;
            
            // Build ID options
            let idHtml = `<div class="dropdown-item ${!currentId ? 'selected' : ''}" onclick="selectOption('eventId', '', 'All IDs')">All IDs</div>`;
            Array.from(idSet).sort().forEach(id => {
                idHtml += `<div class="dropdown-item ${id === currentId ? 'selected' : ''}" onclick="selectOption('eventId', '${id}', '${id}')">${id}</div>`;
            });
            idMenu.innerHTML = idHtml;
            
            // Build Name options
            let nameHtml = `<div class="dropdown-item ${!currentName ? 'selected' : ''}" onclick="selectOption('eventName', '', 'All Events')">All Events</div>`;
            Array.from(nameSet).sort().forEach(name => {
                nameHtml += `<div class="dropdown-item ${name === currentName ? 'selected' : ''}" onclick="selectOption('eventName', '${name}', '${name.replace(/'/g, "\\'")}')">${name}</div>`;
            });
            nameMenu.innerHTML = nameHtml;
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const eventId = document.getElementById('eventIdFilter').value;
            const eventName = document.getElementById('eventNameFilter').value;
            
            const filtered = originalData.filter(row => {
                // Event ID Match
                if (eventId && getValue(row, ['Event ID']) !== eventId) return false;
                
                // Event Name Match
                if (eventName && getValue(row, ['Event Name']) !== eventName) return false;
                
                // Search Match
                if (searchTerm) {
                    const rowText = Object.values(row).join(' ').toLowerCase();
                    if (!rowText.includes(searchTerm)) return false;
                }
                
                return true;
            });
            
            renderTableData(filtered);
        }

        function getValue(row, keys) {
            for (let k of keys) {
                // Check if key exists (case-insensitive search in row keys)
                const foundKey = Object.keys(row).find(rk => rk.toLowerCase() === k.toLowerCase());
                if (foundKey) return row[foundKey];
            }
            return '';
        }


        function formatDate(val) {
            if (!val) return '';
            const d = new Date(val);
            if (isNaN(d.getTime())) return val; // Not a valid date, return as is
            
            // Format as DD/MM/YYYY
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        async function loadData() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');

            const colKeys = currentTab === 'leads' ? LEADS_COL_KEYS : EVENTS_COL_KEYS;
            const sheetName = currentTab === 'leads' ? 'Event Ai Card' : 'Visitor Details';

            thead.innerHTML = `<tr>${colKeys.map(k => `<th style="${k[0] === 'S No.' ? 'width: 60px; text-align: center;' : ''}">${k[0]}</th>`).join('')}</tr>`;
            
            // Show Skeleton Rows
            tbody.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const tr = document.createElement('tr');
                colKeys.forEach(() => {
                    const td = document.createElement('td');
                    td.classList.add('px-4', 'py-4');
                    td.innerHTML = `<div class="skeleton w-full"></div>`;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }

            // Helper for fetch with timeout
            const fetchWithTimeout = (url, options, timeout = 10000) => {
                return Promise.race([
                    fetch(url, options),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out')), timeout))
                ]);
            };

            let response;
            let json;

            try {
                // Use POST for reliability and to pass sheetName correctly
                console.log(`Attempting to fetch ${sheetName}...`);
                response = await fetchWithTimeout(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read', sheetName: sheetName }),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                
                const text = await response.text();
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    console.error("Parse error:", text.substring(0, 500));
                    throw new Error(`Server returned invalid format: ${text.substring(0, 50).replace(/</g, '&lt;')}`);
                }

                if (!json || (!json.success && !Array.isArray(json.data) && !json.data)) {
                     throw new Error(json ? (json.message || 'Unknown error') : 'Empty response');
                }

                let data = Array.isArray(json.data) ? json.data : (json.data && Array.isArray(json.data) ? json.data : []);
                
                // Store original data
                originalData = data;

                // Sort data by Timestamp (assuming idx 0 is Timestamp) - newest first
                originalData.sort((a, b) => {
                    const tA = getValue(a, colKeys[0]);
                    const tB = getValue(b, colKeys[0]);
                    return new Date(tB) - new Date(tA);
                });
                
                // Populate filters and Initial Render
                populateFilterDropdowns(originalData);
                renderTableData(originalData);

            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="${colKeys.length}" class="p-8 text-center text-red-500">
                    <div class="flex flex-col items-center gap-2">
                        <span class="font-bold">Error loading data</span>
                        <span class="text-xs bg-red-50 p-2 rounded">${err.message}</span>
                        <button onclick="loadData()" class="px-3 py-1 bg-white border border-red-200 rounded-lg text-xs mt-2 hover:bg-gray-50">Retry</button>
                    </div>
                </td></tr>`;
            }
        }

        function renderTableData(data) {
            const tbody = document.getElementById('tableBody');
            const colKeys = currentTab === 'leads' ? LEADS_COL_KEYS : EVENTS_COL_KEYS;
            
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${colKeys.length}" class="py-20 text-center text-gray-400 font-bold uppercase tracking-widest text-xs">No records matching filters.</td></tr>`;
                return;
            }

            // Render Data
            data.forEach((row, rowIdx) => {
                if (!row || typeof row !== 'object') return;
                const tr = document.createElement('tr');
                
                // Generate cells based on defined column order
                colKeys.forEach((keys, idx) => {
                    const td = document.createElement('td');
                    td.classList.add('px-4', 'py-4');
                    
                    // Special: Serial Number
                    if (keys[0] === 'S No.') {
                        td.textContent = rowIdx + 1;
                        td.style.fontWeight = '700';
                        td.style.color = '#94a3b8';
                        td.style.textAlign = 'center';
                        td.style.width = '60px'; // Set width for S No.
                        tr.appendChild(td);
                        return;
                    }

                    if (keys[0] === 'Event ID') {
                        td.textContent = getValue(row, keys);
                        tr.appendChild(td);
                        return;
                    }

                    if (keys[0] === 'Action') {
                        const eventId = getValue(row, ['Event ID']);
                        const eventName = getValue(row, ['Event Name']);
                        if (eventId && eventId.trim() !== '' && eventId !== '-') {
                            td.innerHTML = `<button onclick="showQRModal('${eventId}', '${eventName.replace(/'/g, "\\'")}')" class="px-3 py-1 bg-blue-600 text-white text-[10px] font-bold rounded-lg hover:bg-blue-700 transition-colors">Scanner</button>`;
                        } else {
                            td.innerHTML = ''; // Hide button if no Event ID
                        }
                        tr.appendChild(td);
                        return;
                    }

                    let val = getValue(row, keys);
                    // Ensure val is not undefined/null
                    if (val === undefined || val === null) val = '';
                    
                    const colName = keys[0].toLowerCase();

                    // --- 1. DATE FORMATTING (Check by column name or value type) ---
                    if (colName.includes('date') || colName.includes('time') || (val && String(val).match(/^\d{4}-\d{2}-\d{2}T/))) {
                        td.textContent = formatDate(val);
                        tr.appendChild(td);
                        return;
                    }

                    // --- 2. IMAGES ---
                    else if (colName.includes('photo') && val) { 
                        if (String(val).startsWith('http')) {
                            let imgId = null;
                            const patterns = [/\/file\/d\/([^/]+)/, /\/d\/([^/]+)/, /id=([^&]+)/];
                            for (let p of patterns) {
                                const m = val.match(p);
                                if (m && m[1]) { imgId = m[1]; break; }
                            }
                            
                            const thumbUrl = imgId ? `https://drive.google.com/thumbnail?id=${imgId}&sz=w200` : val;
                            const largeUrl = imgId ? `https://drive.google.com/thumbnail?id=${imgId}&sz=w800` : val;

                            td.innerHTML = `
                                <div class="relative inline-block">
                                    <img src="${thumbUrl}" 
                                         referrerpolicy="no-referrer"
                                         class="w-10 h-10 rounded border border-gray-100 object-cover cursor-help hover:border-blue-500 transition-all shadow-sm" 
                                         onmouseenter="showPreview(event, '${largeUrl}')"
                                         onmousemove="movePreview(event)"
                                         onmouseleave="hidePreview()"
                                         onclick="window.open('${val}', '_blank')"
                                         onerror="if(!this.dataset.tried) { this.dataset.tried=1; this.src='https://docs.google.com/uc?id=${imgId}'; } else { this.onerror=null; this.src='https://placehold.co/100x100?text=No+Preview'; }">
                                </div>
                            `;
                            tr.appendChild(td);
                            return;
                        }
                    } 

                    // --- 3. WEBSITE ---
                    else if (colName === 'website' && val && String(val).startsWith('http')) { 
                        td.innerHTML = `<a href="${val}" target="_blank" class="web-link">Web Site Link &nearr;</a>`;
                        tr.appendChild(td);
                        return;
                    } 

                    // --- 4. SOCIAL MEDIA ---
                    else if (colName.includes('social') && val) {
                        const links = String(val).split(/[\n,]+/).map(s => s.trim()).filter(s => s.startsWith('http'));
                        
                        if (links.length > 0) {
                            let html = `<div class="flex flex-col gap-1.5 py-1">`;
                            links.forEach(link => {
                                let label = 'Social Link';
                                let style = 'color: #3b82f6; background: #eff6ff; border-color: #dbeafe;';

                                if (link.includes('facebook')) { 
                                    label = 'Facebook'; 
                                    style = 'color: #ffffff; background: #1877F2; border-color: #1877F2;'; 
                                }
                                else if (link.includes('instagram')) { 
                                    label = 'Instagram'; 
                                    style = 'color: #ffffff; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); border-color: #dc2743;'; 
                                }
                                else if (link.includes('linkedin')) { 
                                    label = 'LinkedIn'; 
                                    style = 'color: #ffffff; background: #0077b5; border-color: #0077b5;'; 
                                }
                                else if (link.includes('twitter') || link.includes('x.com')) { 
                                    label = 'Twitter / X'; 
                                    style = 'color: #ffffff; background: #000000; border-color: #000000;'; 
                                }
                                else if (link.includes('youtube')) { 
                                    label = 'YouTube'; 
                                    style = 'color: #ffffff; background: #FF0000; border-color: #FF0000;'; 
                                }

                                html += `<a href="${link}" target="_blank" 
                                            style="${style}"
                                            class="inline-flex items-center justify-center px-3 py-1.5 rounded-md text-[10px] font-bold border transition-all hover:scale-105 active:scale-95 shadow-sm" 
                                            title="${link}">${label}</a>`;
                            });
                            html += `</div>`;
                            td.innerHTML = html;
                            td.className = ''; 
                        } else {
                            td.textContent = String(val);
                            td.className = 'long-text-cell';
                        }
                        tr.appendChild(td);
                        return;
                    }

                    // --- 5. SOURCE LINK ---
                    else if (colName === 'source link' && val) { 
                       let linkUrl = String(val);
                       let linkLabel = linkUrl;

                       // Try to detect formulas or plain URLs
                       if (linkUrl.startsWith('=HYPERLINK')) {
                            const match = linkUrl.match(/"([^"]+)"/);
                            if (match && match[1]) linkUrl = match[1];
                       }
                       
                       // If looks like a domain but missing protocol
                       if (linkUrl.includes('.') && !linkUrl.includes('://') && !linkUrl.includes(' ')) {
                           linkUrl = 'https://' + linkUrl;
                       }

                       if (linkUrl.startsWith('http')) {
                           td.innerHTML = `<a href="${linkUrl}" target="_blank" class="web-link">Source Link &nearr;</a>`;
                       } else {
                           td.textContent = val;
                           td.className = 'long-text-cell';
                       }
                       tr.appendChild(td);
                       return;
                    } 

                    // --- 6. VALIDATED STATUS ---
                    else if (colName === 'is validated') { 
                        const isValid = val === true || val === 'TRUE';
                        td.innerHTML = isValid 
                            ? '<span class="inline-flex h-2 w-2 rounded-full bg-green-500" title="Validated"></span>' 
                            : '<span class="inline-flex h-2 w-2 rounded-full bg-gray-300" title="Not Validated"></span>';
                        td.className = 'text-center';
                        tr.appendChild(td);
                        return;
                    }

                    // --- 7. EXTERNAL LINKS (General) ---
                    else if (String(val).startsWith('http')) {
                        td.innerHTML = `<a href="${val}" target="_blank" class="text-blue-600 hover:underline">Link &nearr;</a>`;
                        tr.appendChild(td);
                        return;
                    }

                    // --- DEFAULT ---
                    td.className = 'long-text-cell';
                    td.title = val;
                    td.textContent = val;
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        function showQRModal(eventId, eventName) {
            currentEventId = eventId;
            document.getElementById('qrModalTitle').innerText = eventName || 'Event QR Code';
            document.getElementById('qrModalEventId').innerText = `ID: ${eventId}`;
            const modal = document.getElementById('qrModal');
            const container = document.getElementById('qrcodeContainer');
            
            container.innerHTML = ''; // Clear previous
            
            const scanUrl = `${window.location.origin}/scanner/?id=${eventId}`;
            
            qrInstance = new QRCode(container, {
                text: scanUrl,
                width: 200,
                height: 200,
                colorDark : "#0f172a",
                colorLight : "#f8fafc",
                correctLevel : QRCode.CorrectLevel.H
            });
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function hideQRModal() {
            const modal = document.getElementById('qrModal');
            modal.classList.add('hidden');
        }

        function downloadQR() {
            const qrImg = document.querySelector('#qrcodeContainer img');
            if (!qrImg) return;
            
            const link = document.createElement('a');
            link.href = qrImg.src;
            link.download = `QR_${currentEventId}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Fetch config from backend before loading data
        async function fetchConfig() {
            try {
                const response = await fetch('/get-config');
                const config = await response.json();
                APPS_SCRIPT_URL = config.APPS_SCRIPT_URL;
                // Once we have the URL, we can load data
                loadData();
            } catch (err) {
                console.error("Failed to fetch configuration:", err);
            }
        }

        // Start initialization
        fetchConfig();
    </script>
</body>
