<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Database | LeadScan Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Table enhancements from style.css are already applied, adding specific overrides if needed */
        .leads-table th {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            background: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .leads-table td {
            font-size: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .photo-thumb {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-thumb:hover {
            transform: scale(1.5);
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .long-text-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .long-text-cell:hover {
            white-space: normal;
            word-wrap: break-word;
            position: relative;
            background: #fff;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        /* Sticky first column removed per user request */
        /* .leads-table th:first-child,
        .leads-table td:first-child {
            position: sticky;
            left: 0;
            background: inherit;
            z-index: 20;
            border-right: 1px solid #e2e8f0;
        } */
        /* .leads-table th:first-child {
            z-index: 30;
        } */
        /* Row hover effect */
        .leads-table tbody tr:hover td {
            background-color: #f8fafc;
        }

        /* Skeleton Animation */
        @keyframes skeleton-loading {
            0% { background-color: #f3f4f6; }
            50% { background-color: #e5e7eb; }
            100% { background-color: #f3f4f6; }
        }
        .skeleton {
            animation: skeleton-loading 1.5s infinite ease-in-out;
            height: 12px;
            width: 80%;
            border-radius: 6px;
            margin: 4px auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="w-full max-w-[1920px] mx-auto p-4 sm:p-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-6 mb-8">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center justify-center w-10 h-10 bg-white border border-gray-200 rounded-full shadow-sm hover:bg-gray-50 transition-colors shrink-0">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 leading-tight">Leads Database</h1>
                    <p class="text-[10px] sm:text-xs text-gray-500 font-medium uppercase tracking-widest mt-0.5">Automated Intelligence Sync</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="flex bg-white border border-gray-200 p-1 rounded-xl mr-2 shadow-sm">
                    <button onclick="switchTab('leads')" id="tabLeads" class="px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all bg-blue-600 text-white">Leads</button>
                    <button onclick="switchTab('events')" id="tabEvents" class="px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all text-gray-500 hover:bg-gray-50">Event Details</button>
                </div>
                <button onclick="loadData()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white text-xs font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    REFRESH
                </button>
            </div>
        </div>

        <!-- content -->
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col h-[75vh] sm:h-[80vh]">
            
            <div class="leads-table-container flex-1 overflow-auto scrollbar-thin hover:scrollbar-thumb-gray-300">
                <table class="leads-table w-full">
                    <thead id="tableHead">
                        <!-- Head is dynamic -->
                    </thead>
                    <tbody id="tableBody">
                        <!-- Skeleton placeholders on initial load -->
                        <tr><td colspan="22" class="p-4"><div class="skeleton"></div></td></tr>
                        <tr><td colspan="22" class="p-4"><div class="skeleton"></div></td></tr>
                        <tr><td colspan="22" class="p-4"><div class="skeleton"></div></td></tr>
                        <tr><td colspan="22" class="p-4"><div class="skeleton"></div></td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Footer/Status -->
            <div class="px-6 py-3 border-t border-gray-100 bg-gray-50 flex items-center justify-between text-xs text-gray-500">
                <span id="recordCount">0 Records found</span>
                <span>Last updated: <span id="lastUpdated">-</span></span>
            </div>
        </div>
    </div>

    <!-- Global Hover Preview (Fixed to avoid table overflow clipping) -->
    <div id="globalHoverPreview" class="fixed pointer-events-none z-[100] hidden bg-white p-2 rounded-xl shadow-2xl border border-gray-100 w-[280px] transition-opacity duration-200 opacity-0">
        <div class="relative">
            <img id="globalPreviewImg" src="" class="w-full h-auto rounded-lg bg-gray-50 bg-center bg-no-repeat" style="min-height: 150px;">
            <div id="globalPreviewLoading" class="absolute inset-0 flex items-center justify-center bg-gray-50/50 rounded-lg">
                <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
        <div class="mt-2 text-[10px] text-gray-500 font-medium flex justify-between px-1">
            <span>Card Preview</span>
            <span class="text-blue-500">Synced</span>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCPeTYr3DyfmQaEJCQ_A7KnKJ9gZtz4zO-chHkLyvxMFsCd2JRWikUB8LxpFwwbuczxw/exec';
        
        // --- Hover Logic ---
        const previewEl = document.getElementById('globalHoverPreview');
        const previewImg = document.getElementById('globalPreviewImg');
        const previewLoad = document.getElementById('globalPreviewLoading');

        function showPreview(e, highResUrl) {
            previewImg.onload = () => { previewLoad.classList.add('hidden'); };
            previewImg.src = highResUrl;
            previewLoad.classList.remove('hidden');
            
            previewEl.classList.remove('hidden');
            // Small delay to allow fade in
            requestAnimationFrame(() => previewEl.classList.remove('opacity-0'));
            
            movePreview(e);
        }

        function movePreview(e) {
            // Position to the right of the cursor mostly, but flip if too close to edge
            const xOffset = 20;
            const yOffset = 20;
            
            let left = e.clientX + xOffset;
            let top = e.clientY + yOffset;

            // Flip horizontally if overflow right
            if (left + 300 > window.innerWidth) {
                left = e.clientX - 300;
            }
            // Flip vertically if overflow bottom
            if (top + 200 > window.innerHeight) {
                top = e.clientY - 200;
            }

            previewEl.style.left = `${left}px`;
            previewEl.style.top = `${top}px`;
        }

        function hidePreview() {
            previewEl.classList.add('opacity-0');
            setTimeout(() => {
                if (previewEl.classList.contains('opacity-0')) {
                    previewEl.classList.add('hidden');
                    previewImg.src = ''; 
                }
            }, 200);
        }
        // -------------------

        const LEADS_COL_KEYS = [
            ['Card Photo 1'], ['Card Photo 2'], ['Company Name'], ['Industry'], 
            ['Person Name'], ['Designation'], ['Phone'], ['Email'], ['Website'], 
            ['Social Media'], ['Address'], ['Services'], ['Company Size'], ['Founded Year'], 
            ['Registration Status'], ['Trust Score'], ['Key People (Founder/CEO)'], ['Is Validated'], 
            ['Source Link'], ['About Company'], ['Location']
        ];

        const EVENTS_COL_KEYS = [
            ['Action'], ['Event ID'], ['Event Name'], ['Start Date'], ['End Date'], 
            ['Event Location'], ['Event Description'], ['Company Name'], ['Tagline'], ['Industry'], 
            ['Founded Year'], ['Official Phone'], ['Alternate Phone'], ['Official Email'], ['WhatsApp Number'], 
            ['Address Line'], ['City'], ['State'], ['Pincode'], ['Country'], 
            ['Website URL'], ['Google Maps Link'], ['LinkedIn'], ['Instagram'], ['Facebook'], 
            ['Twitter/X'], ['Services Offered'], ['About Company'], ['Member Name'], ['Designation'], 
            ['Member Phone'], ['Company Logo URL']
        ];

        let currentTab = 'leads'; // or 'events'

        function switchTab(tab) {
            currentTab = tab;
            const tabLeads = document.getElementById('tabLeads');
            const tabEvents = document.getElementById('tabEvents');
            
            if (tab === 'leads') {
                tabLeads.className = "px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all bg-blue-600 text-white";
                tabEvents.className = "px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all text-gray-500 hover:bg-gray-50";
            } else {
                tabEvents.className = "px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all bg-blue-600 text-white";
                tabLeads.className = "px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all text-gray-500 hover:bg-gray-50";
            }
            
            loadData();
        }

        function getValue(row, keys) {
            for (let k of keys) {
                // Check if key exists (case-insensitive search in row keys)
                const foundKey = Object.keys(row).find(rk => rk.toLowerCase() === k.toLowerCase());
                if (foundKey) return row[foundKey];
            }
            return '';
        }


        function formatDate(val) {
            if (!val) return '';
            const d = new Date(val);
            if (isNaN(d.getTime())) return val; // Not a valid date, return as is
            
            // Format as DD/MM/YYYY
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        async function loadData() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const countEl = document.getElementById('recordCount');
            const updateEl = document.getElementById('lastUpdated');

            const colKeys = currentTab === 'leads' ? LEADS_COL_KEYS : EVENTS_COL_KEYS;
            const sheetName = currentTab === 'leads' ? 'Ai Card' : 'Event Details';

            thead.innerHTML = `<tr>${colKeys.map(k => `<th>${k[0]}</th>`).join('')}</tr>`;
            
            // Show Skeleton Rows
            tbody.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const tr = document.createElement('tr');
                colKeys.forEach(() => {
                    const td = document.createElement('td');
                    td.classList.add('px-4', 'py-4');
                    td.innerHTML = `<div class="skeleton w-full"></div>`;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }

            // Helper for fetch with timeout
            const fetchWithTimeout = (url, options, timeout = 10000) => {
                return Promise.race([
                    fetch(url, options),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out')), timeout))
                ]);
            };

            let response;
            let json;

            try {
                // Use POST for reliability and to pass sheetName correctly
                console.log(`Attempting to fetch ${sheetName}...`);
                response = await fetchWithTimeout(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read', sheetName: sheetName }),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                
                const text = await response.text();
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    console.error("Parse error:", text.substring(0, 500));
                    throw new Error(`Server returned invalid format: ${text.substring(0, 50).replace(/</g, '&lt;')}`);
                }

                if (!json || (!json.success && !Array.isArray(json.data) && !json.data)) {
                     throw new Error(json ? (json.message || 'Unknown error') : 'Empty response');
                }

                let data = Array.isArray(json.data) ? json.data : (json.data && Array.isArray(json.data) ? json.data : []);
                
                // Sort data by Timestamp (assuming idx 0 is Timestamp) - newest first
                data.sort((a, b) => {
                    const tA = getValue(a, colKeys[0]);
                    const tB = getValue(b, colKeys[0]);
                    return new Date(tB) - new Date(tA);
                });
                
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="${colKeys.length}" class="p-8 text-center text-gray-500">No records found.</td></tr>`;
                    countEl.innerText = '0 Records found';
                    return;
                }

                // Render Data
                data.forEach(row => {
                    if (!row || typeof row !== 'object') return;
                    const tr = document.createElement('tr');
                    
                    // Generate cells based on defined column order
                    colKeys.forEach((keys, idx) => {
                        const td = document.createElement('td');
                        
                        if (keys[0] === 'Action') {
                            const eventId = getValue(row, ['Event ID']);
                            if (eventId && eventId.trim() !== '' && eventId !== '-') {
                                td.innerHTML = `<a href="/scanner/?id=${eventId}" target="_blank" class="px-3 py-1 bg-blue-600 text-white text-[10px] font-bold rounded-lg hover:bg-blue-700 transition-colors">Scanner</a>`;
                            } else {
                                td.innerHTML = ''; // Hide button if no Event ID
                            }
                            tr.appendChild(td);
                            return;
                        }

                        let val = getValue(row, keys);
                        // Ensure val is not undefined/null
                        if (val === undefined || val === null) val = '';
                        
                        const colName = keys[0].toLowerCase();

                        // --- 1. DATE FORMATTING (Check by column name or value type) ---
                        if (colName.includes('date') || colName.includes('time') || (val && String(val).match(/^\d{4}-\d{2}-\d{2}T/))) {
                            td.textContent = formatDate(val);
                            tr.appendChild(td);
                            return;
                        }

                        // --- 2. IMAGES (Leads Col 0 & 1 after Timestamp removal) ---
                        else if (currentTab === 'leads' && (idx === 0 || idx === 1) && val) { 
                            if (String(val).startsWith('http')) {
                                let imgId = null;
                                const patterns = [/\/file\/d\/([^/]+)/, /\/d\/([^/]+)/, /id=([^&]+)/];
                                for (let p of patterns) {
                                    const m = val.match(p);
                                    if (m && m[1]) { imgId = m[1]; break; }
                                }
                                
                                const thumbUrl = imgId ? `https://drive.google.com/thumbnail?id=${imgId}&sz=w200` : val;
                                const largeUrl = imgId ? `https://drive.google.com/thumbnail?id=${imgId}&sz=w800` : val;

                                td.innerHTML = `
                                    <div class="relative inline-block">
                                        <img src="${thumbUrl}" 
                                             referrerpolicy="no-referrer"
                                             class="w-10 h-10 rounded border border-gray-100 object-cover cursor-help hover:border-blue-500 transition-all shadow-sm" 
                                             onmouseenter="showPreview(event, '${largeUrl}')"
                                             onmousemove="movePreview(event)"
                                             onmouseleave="hidePreview()"
                                             onclick="window.open('${val}', '_blank')"
                                             onerror="if(!this.dataset.tried) { this.dataset.tried=1; this.src='https://docs.google.com/uc?id=${imgId}'; } else { this.onerror=null; this.src='https://placehold.co/100x100?text=No+Preview'; }">
                                    </div>
                                `;
                                tr.appendChild(td);
                                return;
                            }
                        } 

                        // --- 3. WEBSITE ---
                        else if (idx === 9 && val && String(val).startsWith('http')) { 
                            td.innerHTML = `<a href="${val}" target="_blank" class="web-link">Web Site Link &nearr;</a>`;
                            tr.appendChild(td);
                            return;
                        } 

                        // --- 4. SOCIAL MEDIA (Col 10) ---
                        else if (idx === 10 && val) {
                            const links = String(val).split(/[\n,]+/).map(s => s.trim()).filter(s => s.startsWith('http'));
                            
                            if (links.length > 0) {
                                let html = `<div class="flex flex-wrap gap-2 max-w-[300px]">`;
                                links.forEach(link => {
                                    let label = 'Link';
                                    let colorClass = 'text-blue-600 bg-blue-50 hover:bg-blue-100';

                                    if (link.includes('facebook')) { label = 'Facebook'; colorClass = 'text-blue-700 bg-blue-50 hover:bg-blue-100'; }
                                    else if (link.includes('instagram')) { label = 'Instagram'; colorClass = 'text-pink-600 bg-pink-50 hover:bg-pink-100'; }
                                    else if (link.includes('linkedin')) { label = 'LinkedIn'; colorClass = 'text-sky-700 bg-sky-50 hover:bg-sky-100'; }
                                    else if (link.includes('twitter') || link.includes('x.com')) { label = 'X'; colorClass = 'text-neutral-900 bg-neutral-100 hover:bg-neutral-200'; }
                                    else if (link.includes('youtube')) { label = 'YouTube'; colorClass = 'text-red-600 bg-red-50 hover:bg-red-100'; }

                                    html += `<a href="${link}" target="_blank" class="inline-flex items-center px-2 py-1 rounded text-[10px] font-semibold border border-transparent ${colorClass} transition-colors" title="${link}">${label}</a>`;
                                });
                                html += `</div>`;
                                td.innerHTML = html;
                                td.className = ''; 
                            } else {
                                td.textContent = String(val);
                                td.className = 'long-text-cell';
                            }
                            tr.appendChild(td);
                            return;
                        }

                        // --- 5. SOURCE LINK ---
                        else if (currentTab === 'leads' && idx === 19 && val) { 
                           let linkUrl = String(val);
                           let linkLabel = linkUrl;

                           // Try to detect formulas or plain URLs
                           if (linkUrl.startsWith('=HYPERLINK')) {
                                const match = linkUrl.match(/"([^"]+)"/);
                                if (match && match[1]) linkUrl = match[1];
                           }
                           
                           // If looks like a domain but missing protocol
                           if (linkUrl.includes('.') && !linkUrl.includes('://') && !linkUrl.includes(' ')) {
                               linkUrl = 'https://' + linkUrl;
                           }

                           if (linkUrl.startsWith('http')) {
                               td.innerHTML = `<a href="${linkUrl}" target="_blank" class="web-link">Source Link &nearr;</a>`;
                           } else {
                               td.textContent = val;
                               td.className = 'long-text-cell';
                           }
                           tr.appendChild(td);
                           return;
                        } 

                        // --- 6. VALIDATED STATUS ---
                        else if (currentTab === 'leads' && idx === 18) { 
                            const isValid = val === true || val === 'TRUE';
                            td.innerHTML = isValid 
                                ? '<span class="inline-flex h-2 w-2 rounded-full bg-green-500" title="Validated"></span>' 
                                : '<span class="inline-flex h-2 w-2 rounded-full bg-gray-300" title="Not Validated"></span>';
                            td.className = 'text-center';
                            tr.appendChild(td);
                            return;
                        }

                        // --- 7. EXTERNAL LINKS (General) ---
                        else if (String(val).startsWith('http')) {
                            td.innerHTML = `<a href="${val}" target="_blank" class="text-blue-600 hover:underline">Link &nearr;</a>`;
                            tr.appendChild(td);
                            return;
                        }

                        // --- DEFAULT ---
                        td.className = 'long-text-cell';
                        td.title = val;
                        td.textContent = val;
                        tr.appendChild(td);
                    });

                    tbody.appendChild(tr);
                });

                countEl.innerText = `${data.length} Records found`;
                updateEl.innerText = new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="${colKeys.length}" class="p-8 text-center text-red-500">
                    <div class="flex flex-col items-center gap-2">
                        <span class="font-bold">Error loading data</span>
                        <span class="text-xs bg-red-50 p-2 rounded">${err.message}</span>
                        <button onclick="loadData()" class="px-3 py-1 bg-white border border-red-200 rounded-lg text-xs mt-2 hover:bg-gray-50">Retry</button>
                    </div>
                </td></tr>`;
            }
        }

        // Load on start
        loadData();
    </script>
</body>
</html>
