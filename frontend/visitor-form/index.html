<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Registration</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .input-field { width: 100%; background: #f1f5f9; border: 1.5px solid transparent; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #0f172a; transition: all 0.2s; outline: none; box-sizing: border-box; }
        .input-field:focus { background: #ffffff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input-label { display: block; font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 16px; width: 100%; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); text-align: center; display: block; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        
        .result-view { display: none; }
        .form-view { display: block; }
        
        /* Loading Overlay */
        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .loader-overlay.active { opacity: 1; pointer-events: all; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-md">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div id="eventIcon" class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-inner">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            </div>
            <h1 id="eventName" class="text-2xl font-black text-gray-900 mb-1">Event Registration</h1>
            <p class="text-gray-500 font-medium text-sm">Please fill in your details to proceed.</p>
        </div>

        <!-- REGISTRATION FORM -->
        <div id="formView" class="glass-card p-6 md:p-8 form-view animate-fade-in">
            <form id="visitorForm" class="space-y-5">
                <div>
                    <label class="input-label">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" id="v_name" class="input-field" required placeholder="John Doe">
                </div>
                <div>
                    <label class="input-label">Mobile Number <span class="text-red-500">*</span></label>
                    <input type="tel" id="v_mobile" class="input-field" required placeholder="+1 234 567 8900">
                </div>
                <div>
                    <label class="input-label">Email Address <span class="text-red-500">*</span></label>
                    <input type="email" id="v_email" class="input-field" required placeholder="john@example.com">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="input-label">Organization</label>
                        <input type="text" id="v_org" class="input-field" placeholder="Company Ltd.">
                    </div>
                    <div>
                        <label class="input-label">Designation</label>
                        <input type="text" id="v_desig" class="input-field" placeholder="Manager">
                    </div>
                </div>
                <div>
                    <label class="input-label">Message / Note (Optional)</label>
                    <textarea id="v_msg" class="input-field min-h-[80px]" placeholder="Looking forward to connecting..."></textarea>
                </div>
                <div class="pt-2">
                    <button type="submit" id="submitBtn" class="btn-primary">Submit Details</button>
                </div>
            </form>
        </div>

        <!-- SUCCESS & CONTACT VIEW -->
        <div id="resultView" class="glass-card p-6 md:p-8 result-view animate-fade-in text-center">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full mx-auto flex items-center justify-center mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Registration Successful!</h2>
            <p class="text-gray-500 text-sm mb-8">Thank you for sharing your details. You can now save the organizer's contact information.</p>
            
            <div class="bg-gray-50 rounded-2xl p-5 mb-8 text-left border border-gray-100">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Organizer Contact</h3>
                <h4 id="orgName" class="text-xl font-bold text-gray-900 mb-1">--</h4>
                <p id="orgTitle" class="text-blue-600 font-semibold text-sm mb-3">--</p>
                <div class="space-y-2 text-sm text-gray-600 font-medium">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        <span id="orgPhone">--</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        <span id="orgEmail">--</span>
                    </div>
                </div>
            </div>

            <button onclick="downloadContact()" class="btn-primary flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Save Contact
            </button>
        </div>

    </div>

    <!-- Loader -->
    <div id="loader" class="loader-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-blue-600 font-bold text-sm uppercase tracking-widest" id="loaderText">Processing...</p>
    </div>

    <script>
        // Extract EventId from URL Path
        // Expected format: /visitor-form/{eventId}
        const pathParts = window.location.pathname.split('/');
        const eventId = pathParts[pathParts.length - 1];
        let eventDataCache = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!eventId || eventId === 'visitor-form') {
                document.getElementById('eventName').innerText = "Invalid Event Link";
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            // Optional: You could fetch event details here to populate the UI before submission
            // For now, we'll keep it simple and just show "Event Registration"
            document.getElementById('eventName').innerText = "Event: " + eventId.toUpperCase();
        });

        document.getElementById('visitorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            
            btn.disabled = true;
            loader.classList.add('active');

            const payload = {
                eventId: eventId,
                visitorName: document.getElementById('v_name').value,
                visitorMobile: document.getElementById('v_mobile').value,
                visitorEmail: document.getElementById('v_email').value,
                visitorOrg: document.getElementById('v_org').value,
                visitorDesig: document.getElementById('v_desig').value,
                message: document.getElementById('v_msg').value
            };

            try {
                // Submit Visitor Data & Fetch Event Contact Info in one call
                const response = await fetch('/submit-visitor-and-get-contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const res = await response.json();
                
                if (res.success && res.contactInfo) {
                    eventDataCache = res.contactInfo; // Store for VCard generation
                    
                    // Populate Result View
                    document.getElementById('orgName').innerText = res.contactInfo.name || 'Event Organizer';
                    document.getElementById('orgTitle').innerText = res.contactInfo.company || 'Event Team';
                    document.getElementById('orgPhone').innerText = res.contactInfo.phone || 'N/A';
                    document.getElementById('orgEmail').innerText = res.contactInfo.email || 'N/A';
                    
                    // Swap Views
                    document.getElementById('formView').style.display = 'none';
                    document.getElementById('resultView').style.display = 'block';
                } else {
                    alert(res.message || 'Failed to submit details. Please try again.');
                }
            } catch (err) {
                alert('Network error while submitting. Please check your connection.');
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.classList.remove('active');
            }
        });

        window.downloadContact = () => {
            if (!eventDataCache) return;
            
            const vC = (val) => (val || '').replace(/\n/g, ' ');
            const contactName = eventDataCache.name || 'Event Contact';
            const nameParts = contactName.split(' ');
            const lastName = nameParts.length > 1 ? nameParts.pop() : '';
            const firstName = nameParts.join(' ') || contactName;

            const vCard = [
                'BEGIN:VCARD', 'VERSION:3.0',
                `N:${vC(lastName)};${vC(firstName)};;;`,
                `FN:${vC(contactName)}`,
                `ORG:${vC(eventDataCache.company || '')}`,
                `TEL;TYPE=WORK,VOICE:${vC(eventDataCache.phone || '')}`,
                `EMAIL;TYPE=WORK,INTERNET:${vC(eventDataCache.email || '')}`,
                `ADR;TYPE=WORK:;;${vC(eventDataCache.address || '')};;;;`,
                `URL:${vC(eventDataCache.website || '')}`,
                'END:VCARD'
            ].join('\n');

            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${contactName.replace(/\\s+/g, '_')}_Contact.vcf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
