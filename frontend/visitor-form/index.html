<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Registration</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .input-field { width: 100%; background: #f1f5f9; border: 1.5px solid transparent; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #0f172a; transition: all 0.2s; outline: none; box-sizing: border-box; }
        .input-field:focus { background: #ffffff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input-label { display: block; font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 16px; width: 100%; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); text-align: center; display: block; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        
        .result-view { display: none; }
        .form-view { display: block; }
        
        /* Loading Overlay */
        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .loader-overlay.active { opacity: 1; pointer-events: all; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-md">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div id="eventIcon" class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-inner">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            </div>
            <h1 id="eventName" class="text-2xl font-black text-gray-900 mb-1 leading-tight">Loading...</h1>
            <p id="eventSubtitle" class="text-gray-500 font-medium text-sm"></p>
        </div>

        <!-- REGISTRATION FORM -->
        <div id="formView" class="glass-card p-6 md:p-8 form-view animate-fade-in">
            <form id="visitorForm" class="space-y-5">
                <div>
                    <label class="input-label">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" id="v_name" class="input-field" required placeholder="John Doe">
                </div>
                <div>
                    <label class="input-label">Mobile Number <span class="text-red-500">*</span></label>
                    <input type="tel" id="v_mobile" class="input-field" required placeholder="+1 234 567 8900">
                </div>
                <div>
                    <label class="input-label">Email Address <span class="text-red-500">*</span></label>
                    <input type="email" id="v_email" class="input-field" required placeholder="john@example.com">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="input-label">Organization</label>
                        <input type="text" id="v_org" class="input-field" placeholder="Company Ltd.">
                    </div>
                    <div>
                        <label class="input-label">Designation</label>
                        <input type="text" id="v_desig" class="input-field" placeholder="Manager">
                    </div>
                </div>
                <div>
                    <label class="input-label">Message / Note (Optional)</label>
                    <textarea id="v_msg" class="input-field min-h-[80px]" placeholder="Looking forward to connecting..."></textarea>
                </div>
                <div class="pt-2">
                    <button type="submit" id="submitBtn" class="btn-primary">Submit Details</button>
                </div>
            </form>
        </div>

        <!-- SUCCESS & CONTACT VIEW -->
        <div id="resultView" class="result-view animate-fade-in pb-10">
            <!-- Digital Business Card -->
            <div class="glass-card overflow-hidden">
                <!-- Cover Area -->
                <div class="h-28 bg-gradient-to-br from-blue-600 to-indigo-800 relative">
                    <div class="absolute -bottom-10 left-6 w-20 h-20 bg-white rounded-2xl shadow-lg border-4 border-white flex items-center justify-center text-blue-600">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    </div>
                </div>
                
                <div class="p-6 pt-14">
                    <h2 id="orgCompany" class="text-2xl font-black text-gray-900 mb-1 leading-tight">--</h2>
                    <p id="orgTagline" class="text-gray-500 font-medium text-sm mb-4 leading-relaxed line-clamp-2">--</p>
                    
                    <!-- Basic details -->
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span id="orgIndustry" class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold uppercase tracking-widest rounded-full hidden"></span>
                        <span id="orgYear" class="px-3 py-1 bg-gray-100 text-gray-600 text-[10px] font-bold uppercase tracking-widest rounded-full hidden"></span>
                    </div>

                    <div class="space-y-4 mb-8">
                        <div id="rowPhone" class="flex items-start gap-4 hidden">
                            <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            </div>
                            <div class="pt-0.5">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Phone</p>
                                <p id="valPhone" class="text-[15px] font-semibold text-gray-900"></p>
                            </div>
                        </div>
                        <div id="rowEmail" class="flex items-start gap-4 hidden">
                            <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                            <div class="pt-0.5 overflow-hidden">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Email</p>
                                <p id="valEmail" class="text-[15px] font-semibold text-gray-900 overflow-hidden text-ellipsis"></p>
                            </div>
                        </div>
                        <div id="rowWebsite" class="flex items-start gap-4 hidden">
                            <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                            </div>
                            <div class="pt-0.5 overflow-hidden">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Website</p>
                                <a id="valWebsite" href="#" target="_blank" class="text-[15px] font-semibold text-blue-600 hover:underline overflow-hidden text-ellipsis block"></a>
                            </div>
                        </div>
                        <div id="rowAddress" class="flex items-start gap-4 hidden">
                            <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                            <div class="pt-0.5">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Location</p>
                                <p id="valAddress" class="text-[14px] font-semibold text-gray-900 leading-snug"></p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Social Links -->
                    <div id="socialLinks" class="flex gap-3 mb-8 justify-start hidden">
                         <a id="linkLi" href="#" target="_blank" class="w-10 h-10 rounded-full bg-[#E1F0FF] text-[#0077b5] flex items-center justify-center hidden hover:scale-110 transition-transform"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>
                         <a id="linkTw" href="#" target="_blank" class="w-10 h-10 rounded-full bg-[#E1F2FB] text-[#1DA1F2] flex items-center justify-center hidden hover:scale-110 transition-transform"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg></a>
                         <a id="linkFb" href="#" target="_blank" class="w-10 h-10 rounded-full bg-[#E2EAFD] text-[#1877F2] flex items-center justify-center hidden hover:scale-110 transition-transform"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>
                         <a id="linkIg" href="#" target="_blank" class="w-10 h-10 rounded-full bg-[#FCE6F1] text-[#E4405F] flex items-center justify-center hidden hover:scale-110 transition-transform"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
                    </div>
                    
                    <!-- Key Person -->
                    <div id="keyPersonBox" class="bg-gray-50 rounded-2xl p-4 border border-gray-100 flex items-center gap-4 mb-8 hidden">
                        <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xl uppercase shadow-inner" id="kpInitial"></div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Key Contact</p>
                            <p id="kpName" class="font-bold text-gray-900 leading-tight"></p>
                        </div>
                    </div>

                    <button onclick="downloadContact()" class="btn-primary flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Save Detailed Contact
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Loader -->
    <div id="loader" class="loader-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-blue-600 font-bold text-sm uppercase tracking-widest" id="loaderText">Processing...</p>
    </div>

    <script>
        // Extract EventId from URL Path
        // Expected format: /visitor-form/{eventId}
        const pathParts = window.location.pathname.split('/');
        const eventId = pathParts[pathParts.length - 1];
        let eventDataCache = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!eventId || eventId === 'visitor-form') {
                document.getElementById('eventName').innerText = "Invalid Event Link";
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            // Fetch the event name to change the intro text
            try {
                const r = await fetch(`/get-event/${eventId}`);
                const resData = await r.json();
                if (resData.success && resData.data) {
                    const evName = resData.data['Event Name'];
                    document.getElementById('eventName').innerText = `Thank you for visiting ${evName}!`;
                    document.getElementById('eventSubtitle').innerText = "Please share your details to connect.";
                } else {
                    document.getElementById('eventName').innerText = "Thank you for visiting!";
                    document.getElementById('eventSubtitle').innerText = "Please share your details to connect.";
                }
            } catch (e) {
                document.getElementById('eventName').innerText = "Thank you for visiting!";
                document.getElementById('eventSubtitle').innerText = "Please share your details to connect.";
            }
        });

        document.getElementById('visitorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            
            btn.disabled = true;
            loader.classList.add('active');

            const payload = {
                eventId: eventId,
                visitorName: document.getElementById('v_name').value,
                visitorMobile: document.getElementById('v_mobile').value,
                visitorEmail: document.getElementById('v_email').value,
                visitorOrg: document.getElementById('v_org').value,
                visitorDesig: document.getElementById('v_desig').value,
                message: document.getElementById('v_msg').value
            };

            try {
                // Submit Visitor Data & Fetch Event Contact Info in one call
                const response = await fetch('/submit-visitor-and-get-contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const res = await response.json();
                
                if (res.success && res.contactInfo) {
                    eventDataCache = res.contactInfo; // Store for VCard generation
                    
                    // Populate Digital Business Card View
                    const c = res.contactInfo;
                    document.getElementById('orgCompany').innerText = c.company || 'Event Contact';
                    if (c.tagline) { document.getElementById('orgTagline').innerText = c.tagline; document.getElementById('orgTagline').classList.remove('hidden'); }
                    
                    if (c.industry) { document.getElementById('orgIndustry').innerText = c.industry; document.getElementById('orgIndustry').classList.remove('hidden'); }
                    if (c.foundedYear) { document.getElementById('orgYear').innerText = "Est. " + c.foundedYear; document.getElementById('orgYear').classList.remove('hidden'); }
                    
                    if (c.phone) { document.getElementById('valPhone').innerText = c.phone; document.getElementById('rowPhone').classList.remove('hidden'); }
                    if (c.email) { document.getElementById('valEmail').innerText = c.email; document.getElementById('rowEmail').classList.remove('hidden'); }
                    if (c.website) { document.getElementById('valWebsite').innerText = c.website; document.getElementById('valWebsite').href = (c.website.startsWith('http') ? c.website : 'https://'+c.website); document.getElementById('rowWebsite').classList.remove('hidden'); }
                    
                    const fullAddr = [c.address, c.city, c.state, c.country].filter(Boolean).join(', ');
                    if (fullAddr) { document.getElementById('valAddress').innerText = fullAddr; document.getElementById('rowAddress').classList.remove('hidden'); }
                    
                    let hasSocial = false;
                    if (c.linkedin) { document.getElementById('linkLi').href = c.linkedin; document.getElementById('linkLi').classList.remove('hidden'); hasSocial = true; }
                    if (c.twitter) { document.getElementById('linkTw').href = c.twitter; document.getElementById('linkTw').classList.remove('hidden'); hasSocial = true; }
                    if (c.facebook) { document.getElementById('linkFb').href = c.facebook; document.getElementById('linkFb').classList.remove('hidden'); hasSocial = true; }
                    if (c.instagram) { document.getElementById('linkIg').href = c.instagram; document.getElementById('linkIg').classList.remove('hidden'); hasSocial = true; }
                    if (hasSocial) document.getElementById('socialLinks').classList.remove('hidden');
                    
                    if (c.name) {
                        document.getElementById('kpName').innerText = c.name;
                        document.getElementById('kpInitial').innerText = c.name.charAt(0);
                        document.getElementById('keyPersonBox').classList.remove('hidden');
                    }
                    
                    // Swap Views
                    document.getElementById('formView').style.display = 'none';
                    // Scroll to top upon success
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    document.getElementById('resultView').style.display = 'block';
                } else {
                    alert(res.message || 'Failed to submit details. Please try again.');
                }
            } catch (err) {
                alert('Network error while submitting. Please check your connection.');
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.classList.remove('active');
            }
        });

        window.downloadContact = () => {
            if (!eventDataCache) return;
            
            const vC = (val) => (val || '').replace(/\n/g, ' ');
            const contactName = eventDataCache.name || 'Event Contact';
            const nameParts = contactName.split(' ');
            const lastName = nameParts.length > 1 ? nameParts.pop() : '';
            const firstName = nameParts.join(' ') || contactName;

            const vCard = [
                'BEGIN:VCARD', 'VERSION:3.0',
                `N:${vC(lastName)};${vC(firstName)};;;`,
                `FN:${vC(contactName)}`,
                `ORG:${vC(eventDataCache.company || '')}`,
                `TEL;TYPE=WORK,VOICE:${vC(eventDataCache.phone || '')}`,
                `EMAIL;TYPE=WORK,INTERNET:${vC(eventDataCache.email || '')}`,
                `ADR;TYPE=WORK:;;${vC(eventDataCache.address || '')};${vC(eventDataCache.city || '')};${vC(eventDataCache.state || '')};${vC(eventDataCache.pincode || '')};${vC(eventDataCache.country || '')}`,
                `URL:${vC(eventDataCache.website || '')}`,
                'END:VCARD'
            ].join('\n');

            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${contactName.replace(/\\s+/g, '_')}_Contact.vcf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
